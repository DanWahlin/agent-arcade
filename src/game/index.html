<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' data: blob:; connect-src 'self' blob:;">
  <title>Agent Arcade</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      cursor: default;
    }
    #game {
      width: 100%;
      height: 100%;
      background: transparent;
    }
    canvas {
      background: transparent !important;
      display: block;
    }

    /* ---------- HUD bar ---------- */
    #hud {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 8px 16px;
      background: linear-gradient(180deg, #1a1f3a 0%, #0a0e22 100%);
      border: 2px solid #ffd54a;
      border-radius: 12px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.08) inset,
        0 6px 24px rgba(0, 0, 0, 0.7),
        0 0 18px rgba(255, 213, 74, 0.35);
      color: #e8ecff;
      font-family: -apple-system, system-ui, 'Helvetica Neue', sans-serif;
      font-size: 13px;
      pointer-events: none;
      user-select: none;
      z-index: 10;
      white-space: nowrap;
    }

    .hud-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hud-divider {
      width: 1px;
      align-self: stretch;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.25), transparent);
    }

    .hud-spacer {
      flex: 1;
    }

    .ctrl {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    kbd {
      display: inline-block;
      min-width: 18px;
      padding: 2px 6px;
      font-family: 'SF Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      background: linear-gradient(180deg, #3b4570 0%, #232846 100%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-bottom-width: 2px;
      border-radius: 4px;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.5);
    }

    .ctrl-label {
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #b8c2e8;
    }

    .title {
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #ffd54a;
      text-shadow: 0 0 8px rgba(255, 213, 74, 0.5);
    }

    /* Score: big neon */
    .score-wrap {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .score-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #ffd54a;
      text-shadow: 0 0 6px rgba(255, 213, 74, 0.6);
    }
    .score-value {
      font-family: 'SF Mono', ui-monospace, Menlo, monospace;
      font-size: 22px;
      font-weight: 900;
      color: #ffeb3b;
      text-shadow:
        0 0 8px rgba(255, 235, 59, 0.9),
        0 0 18px rgba(255, 152, 0, 0.55),
        0 2px 0 rgba(0, 0, 0, 0.6);
      min-width: 70px;
      text-align: right;
      transition: transform 120ms ease-out;
    }
    .score-value.bump {
      transform: scale(1.25);
      filter: brightness(1.4);
    }
    @keyframes scorePop {
      0%   { transform: translateY(0) scale(1);    color: #ffeb3b; }
      30%  { transform: translateY(-3px) scale(1.28); color: #fff59d; }
      100% { transform: translateY(0) scale(1);    color: #ffeb3b; }
    }
    .score-value.pop {
      animation: scorePop 320ms ease-out;
    }

    .lives-value {
      font-family: 'SF Mono', ui-monospace, Menlo, monospace;
      font-size: 20px;
      font-weight: 900;
      color: #ff5252;
      text-shadow:
        0 0 8px rgba(255, 82, 82, 0.9),
        0 0 14px rgba(255, 0, 0, 0.5),
        0 2px 0 rgba(0, 0, 0, 0.6);
      min-width: 20px;
      text-align: center;
    }

    .level-value {
      font-family: 'SF Mono', ui-monospace, Menlo, monospace;
      font-size: 20px;
      font-weight: 900;
      color: #4fc3f7;
      text-shadow:
        0 0 8px rgba(79, 195, 247, 0.9),
        0 0 14px rgba(33, 150, 243, 0.5),
        0 2px 0 rgba(0, 0, 0, 0.6);
      min-width: 20px;
      text-align: center;
    }

    .hi-value {
      font-family: 'SF Mono', ui-monospace, Menlo, monospace;
      font-size: 16px;
      font-weight: 900;
      color: #aaa;
      text-shadow:
        0 0 6px rgba(170, 170, 170, 0.5),
        0 2px 0 rgba(0, 0, 0, 0.6);
      min-width: 50px;
      text-align: right;
    }

    /* Help button */
    .help-btn {
      pointer-events: auto;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: linear-gradient(180deg, #2a3258 0%, #161a30 100%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: #b8c2e8;
      font-weight: 600;
      letter-spacing: 0.4px;
      font-size: 12px;
      transition: all 120ms ease;
    }
    .help-btn:hover {
      color: #fff;
      border-color: #ffd54a;
      box-shadow: 0 0 12px rgba(255, 213, 74, 0.6);
    }
    .help-btn .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffd54a;
      color: #fff;
      font-weight: 800;
      font-size: 12px;
    }

    /* Help modal */
    #help-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(5, 8, 20, 0.7);
      backdrop-filter: blur(6px);
      z-index: 100;
      pointer-events: auto;
    }
    #help-overlay.show { display: flex; }

    #help-modal {
      min-width: 380px;
      max-width: 90vw;
      padding: 28px 32px;
      background: linear-gradient(180deg, #1a1f3a 0%, #0a0e22 100%);
      border: 2px solid #ffd54a;
      border-radius: 16px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.08) inset,
        0 12px 48px rgba(0, 0, 0, 0.85),
        0 0 32px rgba(255, 213, 74, 0.45);
      color: #e8ecff;
      font-family: -apple-system, system-ui, 'Helvetica Neue', sans-serif;
      animation: modalIn 200ms cubic-bezier(0.2, 0.9, 0.3, 1.2);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.85) translateY(-10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    #help-modal h2 {
      margin: 0 0 4px;
      font-size: 22px;
      color: #ffd54a;
      text-shadow: 0 0 10px rgba(255, 213, 74, 0.6);
      letter-spacing: 1px;
    }
    #help-modal .subtitle {
      margin: 0 0 20px;
      font-size: 12px;
      color: #8892bd;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .help-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      row-gap: 12px;
      column-gap: 18px;
      align-items: center;
    }
    .help-grid .keys {
      display: flex;
      gap: 4px;
      justify-content: flex-end;
    }
    .help-grid .desc {
      color: #c8d0ee;
      font-size: 14px;
    }
    .help-close {
      margin-top: 22px;
      width: 100%;
      padding: 9px;
      cursor: pointer;
      background: linear-gradient(180deg, #ffd54a 0%, #c9a020 100%);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      color: #fff;
      font-weight: 700;
      letter-spacing: 1px;
      font-size: 13px;
      transition: filter 120ms;
    }
    .help-close:hover { filter: brightness(1.15); }

    /* ---------- Pause: HUD bar variant ---------- */
    #hud.paused {
      border-color: #ffd54a;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.08) inset,
        0 6px 24px rgba(0, 0, 0, 0.7),
        0 0 22px rgba(255, 213, 74, 0.55);
      animation: hudPulse 1.6s ease-in-out infinite;
    }
    @keyframes hudPulse {
      0%, 100% { box-shadow: 0 0 0 1px rgba(255,255,255,0.08) inset, 0 6px 24px rgba(0,0,0,0.7), 0 0 18px rgba(255, 213, 74, 0.45); }
      50%      { box-shadow: 0 0 0 1px rgba(255,255,255,0.08) inset, 0 6px 24px rgba(0,0,0,0.7), 0 0 32px rgba(255, 213, 74, 0.85); }
    }
    .pause-badge {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      background: linear-gradient(180deg, #4d3a06 0%, #2a1f00 100%);
      border: 1px solid #ffd54a;
      border-radius: 6px;
      color: #ffd54a;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 1.2px;
      text-shadow: 0 0 6px rgba(255, 213, 74, 0.6);
    }
    #hud.paused .pause-badge { display: inline-flex; }
    #hud.paused .when-running { display: none; }
    .pause-badge .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffd54a;
      box-shadow: 0 0 8px #ffd54a;
      animation: dotBlink 1s ease-in-out infinite;
    }
    @keyframes dotBlink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.25; }
    }

    /* ---------- Game selector ---------- */
    .game-select {
      pointer-events: auto;
      background: rgba(0,0,0,0.6);
      color: #ffd700;
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: -apple-system, system-ui, 'Helvetica Neue', sans-serif;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      outline: none;
    }
    .game-select:hover {
      border-color: rgba(255,215,0,0.8);
    }
    .game-select option {
      background: #1a1a2e;
      color: #ffd700;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="hud-section">
      <span id="hud-title" class="title">AGENT ARCADE</span>
    </div>
    <div class="hud-spacer"></div>
    <div class="hud-section">
      <select id="game-select" class="game-select">
        <!-- populated by game.ts -->
      </select>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-section">
      <button id="help-btn" class="help-btn when-running" type="button">
        <span class="badge">?</span>
      </button>
      <span class="pause-badge"><span class="dot"></span>PAUSED — <kbd>Esc</kbd> to resume</span>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-section score-wrap">
      <span class="score-label">LIVES</span>
      <span id="lives-value" class="lives-value">3</span>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-section score-wrap">
      <span class="score-label">SCORE</span>
      <span id="score-value" class="score-value">0</span>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-section score-wrap">
      <span class="score-label">HIGH</span>
      <span id="hi-value" class="hi-value">0</span>
    </div>
  </div>

  <div id="help-overlay">
    <div id="help-modal" role="dialog" aria-labelledby="help-title">
      <h2 id="help-title">🎮 AGENT ARCADE</h2>
      <p class="subtitle">Controls</p>
      <div class="help-grid">
        <div class="keys"><kbd>←</kbd><kbd>→</kbd></div>
        <div class="desc">Move left / right</div>

        <div class="keys"><kbd>Space</kbd></div>
        <div class="desc">Jump (hold for higher)</div>

        <div class="keys"><kbd>⇧ Shift</kbd></div>
        <div class="desc">Run (hold while moving)</div>

        <div class="keys"><kbd>F</kbd></div>
        <div class="desc">Fire (when powered up)</div>

        <div class="keys"><kbd>Esc</kbd></div>
        <div class="desc">Pause / Resume</div>

        <div class="keys"><kbd>⌃</kbd><kbd>⌥</kbd><kbd>M</kbd></div>
        <div class="desc">Show / Hide window (global)</div>

        <div class="keys">Tray menu</div>
        <div class="desc">Show / Hide window</div>

        <div class="keys"><kbd>⌘</kbd><kbd>Q</kbd></div>
        <div class="desc">Quit</div>
      </div>
      <button id="help-close" class="help-close" type="button">CLOSE</button>
    </div>
  </div>

  <div id="pause-overlay" style="display:none"></div>

  <div id="game"></div>
  <script>
    (function () {
      var helpBtn = document.getElementById('help-btn');
      var helpOverlay = document.getElementById('help-overlay');
      var helpClose = document.getElementById('help-close');
      var hud = document.getElementById('hud');

      function isPaused() { return hud.classList.contains('paused'); }
      function setPaused(p) {
        hud.classList.toggle('paused', p);
        if (window.__agentArcadePause) {
          try { window.__agentArcadePause(p); } catch (e) {}
        } else if (window.agentArcade && window.agentArcade.setClickThrough) {
          window.agentArcade.setClickThrough(p);
          if (window.agentArcade.setPaused) window.agentArcade.setPaused(p);
        }
      }

      function showHelp() {
        if (!isPaused()) setPaused(true);
        helpOverlay.classList.add('show');
      }
      function hideHelp() {
        helpOverlay.classList.remove('show');
        // Leave game paused after closing Controls — user presses Esc to resume.
      }
      helpBtn.addEventListener('click', showHelp);
      helpClose.addEventListener('click', hideHelp);
      helpOverlay.addEventListener('click', function (e) {
        if (e.target === helpOverlay) hideHelp();
      });

      document.addEventListener('keydown', function (e) {
        if (e.key !== 'Escape') return;
        e.stopPropagation();
        e.preventDefault();
        if (helpOverlay.classList.contains('show')) {
          hideHelp();
          return;
        }
        setPaused(!isPaused());
      }, true);
    })();
  </script>
  <script src="./phaser.min.js"></script>
  <script type="module" src="./game.js"></script>
</body>
</html>
