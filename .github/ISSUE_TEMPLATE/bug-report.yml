name: 🐛 Bug Report
description: Report a bug in Agent Arcade
labels: ["bug"]
body:
  - type: dropdown
    id: game
    attributes:
      label: Which game?
      description: Select the game where the bug occurs
      options:
        - Alien Onslaught
        - Cosmic Rocks
        - Galaxy Blaster
        - Ninja Runner
        - General / All games
        - Tauri shell / Overlay
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly
      placeholder: "When I do X, Y happens instead of Z"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Launch Agent Arcade
        2. Switch to Cosmic Rocks
        3. Press Space to fire
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Agent Arcade version
      description: "Find this in the tray icon menu or the release you downloaded"
      placeholder: "e.g., 0.5.1"

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: If applicable, add screenshots or screen recordings to help explain the problem
