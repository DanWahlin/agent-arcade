name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            args: '--target universal-apple-darwin'
          - os: windows-latest
            platform: win
            args: ''
          - os: ubuntu-22.04
            platform: linux
            args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'mac' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-arcade-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.app
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.msi
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          body: |
            ## 🎮 Download Agent Arcade

            ### 🍎 macOS
            | File | Description |
            |------|-------------|
            | `*.dmg` | macOS installer (Universal — Apple Silicon + Intel) |

            ### 🪟 Windows
            | File | Description |
            |------|-------------|
            | `*.msi` | Windows installer (x64) |

            ### 🐧 Linux
            | File | Description |
            |------|-------------|
            | `*.AppImage` | Universal Linux (run anywhere) |
            | `*.deb` | Debian/Ubuntu package |

            ---
            *A stress-relief retro arcade overlay for your desktop — play while your AI agent is thinking! Built with Tauri + Phaser + TypeScript.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
