name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package
        run: npm run dist:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-arcade-${{ matrix.platform }}
          path: |
            build/*.dmg
            build/*.zip
            build/*.exe
            build/*.AppImage
            build/*.deb
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          body: |
            ## 🎮 Download Agent Arcade

            ### 🍎 macOS
            | File | Description |
            |------|-------------|
            | `Agent Arcade-*-arm64.dmg` | Apple Silicon (M1/M2/M3/M4) installer |
            | `Agent Arcade-*.dmg` | Intel Mac installer |
            | `Agent Arcade-*-arm64-mac.zip` | Apple Silicon portable |
            | `Agent Arcade-*-mac.zip` | Intel Mac portable |

            ### 🪟 Windows
            | File | Description |
            |------|-------------|
            | `Agent Arcade Setup *.exe` | Windows installer (x64) |

            ### 🐧 Linux
            | File | Description |
            |------|-------------|
            | `Agent Arcade-*.AppImage` | Universal Linux (run anywhere) |
            | `agent-arcade_*_amd64.deb` | Debian/Ubuntu package |

            ---
            *A stress-relief retro arcade overlay for your desktop — play while your AI agent is thinking!*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
